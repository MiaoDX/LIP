name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      # 1. Build VitePress docs
      - run: npm run docs:build

      # 2. Copy standalone HTML from share/ → output
      - run: mkdir -p .vitepress/dist/share && cp share/*.html share/*.png share/*.jpg .vitepress/dist/share/ 2>/dev/null || true

      # 3. Build Marp slides → output to VitePress dist
      - run: mkdir -p .vitepress/dist/slides/marp
      - run: npx @marp-team/marp-cli slides/marp/low-cost-multi-agent.md -o .vitepress/dist/slides/marp/low-cost-multi-agent.html --html

      # 4. Build Slidev slides → output to VitePress dist
      - run: npx slidev build slides/slides.md --base /LIP/slides/slidev/ --out ../../.vitepress/dist/slides/slidev

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
