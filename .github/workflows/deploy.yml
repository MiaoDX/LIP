name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      # 1. Build VitePress docs
      - run: npm run docs:build

      # 2. Copy standalone HTML + assets from share/presentations/ → output
      - run: mkdir -p .vitepress/dist/share && cp share/presentations/*.html share/presentations/*.png share/presentations/*.jpg .vitepress/dist/share/ 2>/dev/null || true

      # 2.5 Copy consult/ → output
      - run: mkdir -p .vitepress/dist/consult && cp public/consult/*.html .vitepress/dist/consult/ 2>/dev/null || true

      # 3. Build Marp slides → output to VitePress dist.
      # Scanner picks up every md file with `marp: true` in frontmatter
      # (see scripts/build-slides.mjs) and writes .html to
      # .vitepress/dist/slides/marp/<slug>.html. PDF generation is opt-in
      # via MARP_PDF=1 (skipped by default to keep CI fast + deterministic).
      - run: npm run marp:build

      # 4. Build Slidev slides → output to VitePress dist
      - run: npx slidev build slides/slides.md --base /LIP/slides/slidev/ --out ../../.vitepress/dist/slides/slidev

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
