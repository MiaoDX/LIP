name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      # 0. Deploy Guard — 防止覆盖根目录 index.html
      - name: Run deploy guard
        run: python3 scripts/deploy-guard.py
        working-directory: .

      # 1. Build VitePress docs
      - run: npm run docs:build

      # 1.5 Post-build guard + link checker
      - name: Verify build output structure
        run: |
          # 确保构建产物都在预期子目录下
          if [ -f .vitepress/dist/index.html ]; then
            echo "Build output has dist/index.html (expected for VitePress)"
          fi
          # 检查是否有不应该出现的文件
          if [ -f .vitepress/dist/CNAME ] || [ -f .vitepress/dist/.nojekyll ]; then
            echo "Warning: Build output contains repo-level files"
          fi

      - name: Run link checker
        run: |
          curl -sSfL https://github.com/lycheeverse/lychee/releases/download/lychee-v0.18.1/lychee-x86_64-unknown-linux-gnu.tar.gz | tar xz -C /tmp
          # Start a local HTTP server for lychee to resolve /LIP/ absolute paths
          python3 -m http.server 8080 --directory .vitepress/dist &
          SERVER_PID=$!
          sleep 2
          /tmp/lychee --timeout 15 --exclude-all-private --format detailed http://localhost:8080/
          kill $SERVER_PID || true
        working-directory: .

      # 2. Copy standalone HTML + assets from share/presentations/ → output
      - run: mkdir -p .vitepress/dist/share && cp share/presentations/*.html share/presentations/*.png share/presentations/*.jpg .vitepress/dist/share/ 2>/dev/null || true

      # 2.5 Copy consult/ → output
      - run: mkdir -p .vitepress/dist/consult && cp public/consult/*.html .vitepress/dist/consult/ 2>/dev/null || true

      # 3. Build Marp slides → output to VitePress dist
      - run: mkdir -p .vitepress/dist/slides/marp
      - run: npx @marp-team/marp-cli slides/marp/low-cost-multi-agent.md -o .vitepress/dist/slides/marp/low-cost-multi-agent.html --html

      # 4. Build Slidev slides → output to VitePress dist
      - run: npx slidev build slides/slides.md --base /LIP/slides/slidev/ --out ../../.vitepress/dist/slides/slidev

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
