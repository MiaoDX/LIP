<!-- Controls -->
<div class="controls">
<button onclick="prevSlide()">← Prev</button>
<span class="page" id="pageNum">1 / 14</span>
<button onclick="nextSlide()">Next →</button>
<button onclick="toggleNotes()" id="notesBtn">Notes</button>
</div>

<div class="notes-panel" id="notesPanel">
<h4>演讲者笔记</h4>
<p id="notesText"></p>
</div>

<script>
let current = 0;
const slides = document.querySelectorAll('.slide');
const total = slides.length;
let notesVisible = false;

function showSlide(n) {
slides[current].classList.remove('active');
current = ((n % total) + total) % total;
slides[current].classList.add('active');
document.getElementById('pageNum').textContent = `${current + 1} / ${total}`;
document.getElementById('progress').style.width = `${((current + 1) / total) * 100}%`;
document.getElementById('notesText').textContent = slides[current].dataset.notes || '';
}

function nextSlide() { showSlide(current + 1); }
function prevSlide() { showSlide(current - 1); }
function toggleNotes() {
notesVisible = !notesVisible;
document.getElementById('notesPanel').classList.toggle('show', notesVisible);
document.getElementById('notesBtn').style.background = notesVisible ? '#F5E6CC' : '';
}

document.addEventListener('keydown', (e) => {
if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextSlide(); }
if (e.key === 'ArrowLeft') { e.preventDefault(); prevSlide(); }
if (e.key === 'n' || e.key === 'N') toggleNotes();
if (e.key === 'f' || e.key === 'F') {
if (!document.fullscreenElement) document.documentElement.requestFullscreen();
else document.exitFullscreen();
}
});

// Touch support
let touchStartX = 0;
document.addEventListener('touchstart', e => touchStartX = e.touches[0].clientX);
document.addEventListener('touchend', e => {
const diff = e.changedTouches[0].clientX - touchStartX;
if (Math.abs(diff) > 50) diff > 0 ? prevSlide() : nextSlide();
});

showSlide(0);
</script>
</body>
</html>
