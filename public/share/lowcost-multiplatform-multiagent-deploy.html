<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>低成本云端多平台多 Agent 部署</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #FFF8F0; color: #2D2A26; font-family: 'Noto Sans SC','PingFang SC','Microsoft YaHei',system-ui,sans-serif; overflow: hidden; height: 100vh; }
.slide { display: none; width: 100vw; height: 100vh; position: relative; }
.slide.active { display: flex; flex-direction: column; align-items: center; justify-content: center; }
.slide svg { width: 100vw; height: 100vh; object-fit: contain; }
.controls { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 12px; align-items: center; z-index: 100; background: rgba(255,248,240,0.92); padding: 8px 20px; border-radius: 24px; backdrop-filter: blur(8px); border: 1px solid #E8D5C0; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
.controls button { background: none; border: 1px solid #D4C0A8; color: #8B7355; padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 14px; transition: all 0.2s; }
.controls button:hover { background: #F0E4D4; color: #5A4632; }
.controls .page { font-size: 13px; color: #A08B70; min-width: 60px; text-align: center; }
.notes-panel { position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%); max-width: 800px; width: 90%; background: rgba(255,248,240,0.97); border: 1px solid #E8D5C0; border-radius: 12px; padding: 20px; font-size: 14px; line-height: 1.8; color: #5A4632; display: none; max-height: 35vh; overflow-y: auto; backdrop-filter: blur(8px); box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
.notes-panel.show { display: block; }
.notes-panel h4 { color: #D4803A; margin-bottom: 8px; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
.progress { position: fixed; top: 0; left: 0; height: 3px; background: linear-gradient(90deg, #E8913A, #D4803A); transition: width 0.3s; z-index: 100; }
.hint { position: fixed; top: 20px; right: 20px; font-size: 11px; color: #B8A48C; z-index: 100; }
</style>
</head>
<body>
<div class="progress" id="progress"></div>
<div class="hint">← → 翻页 · N 笔记 · F 全屏</div>

<!-- Slide content would continue here -->
</body>
</html>
